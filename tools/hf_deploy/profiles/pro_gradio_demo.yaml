# PRO Gradio demo (Tonic / ZeroGPU).
#
# This Space orchestrates PRO jobs against the game server, then runs the final VLM
# locally in the Space (Transformers + ZeroGPU).
hf_space_owner_org: Tonic

space_hardware: zero-a10g
space_sdk: gradio
sleep_time_seconds: -1

variables:
  PORT: "7860"
  # Base URL of the game server that exposes `/api/v1/pro/jobs` and `/api/v1/pro/vlm/model-manifest`.
  # Matches the current CI deployment of `NuTonic/nutonic-game-server` (see `tools/hf_deploy/profiles/game_server.yaml`).
  NUTONIC_SERVER_ORIGIN: "https://NuTonic-nutonic-game-server.hf.space"
  # Polling and runtime controls (non-secret).
  NUTONIC_HTTP_TIMEOUT_SECONDS: "60"
  NUTONIC_PRO_POLL_INTERVAL_SECONDS: "2"
  NUTONIC_PRO_POLL_TIMEOUT_SECONDS: "240"

secrets:
  # Optional. When the upstream game server / workers enable inbound HMAC verification
  # (`NUTONIC_INFERENCE_REQUIRE_INBOUND_HMAC=1`), this Space must sign requests with the
  # same shared secret. Same env var name and contract as the server and worker profiles
  # (see `tools/hf_deploy/profiles/game_server.yaml` and `tools/hf_deploy/profiles/pro_materialization.yaml`).
  NUTONIC_INFERENCE_HMAC_SECRET: NUTONIC_INFERENCE_HMAC_SECRET
  # Optional. Pre-issued JWT used for game server requests. When set, the demo will not call
  # `/api/v1/auth/token` (helps avoid 429 rate limits under load).
  NUTONIC_SERVER_BEARER_TOKEN: NUTONIC_SERVER_BEARER_TOKEN
  # Optional: override the Transformers VLM bundle used by the Space (instead of the game server manifest).
  NUTONIC_VLM_OVERRIDE_BUNDLE_ID: NUTONIC_VLM_OVERRIDE_BUNDLE_ID
  NUTONIC_VLM_OVERRIDE_REVISION: NUTONIC_VLM_OVERRIDE_REVISION
  NUTONIC_VLM_OVERRIDE_DOWNLOAD_URL: NUTONIC_VLM_OVERRIDE_DOWNLOAD_URL
  NUTONIC_VLM_OVERRIDE_SHA256: NUTONIC_VLM_OVERRIDE_SHA256
  NUTONIC_VLM_OVERRIDE_SIZE_BYTES: NUTONIC_VLM_OVERRIDE_SIZE_BYTES

