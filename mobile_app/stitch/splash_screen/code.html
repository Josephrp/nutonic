<style>
        .scanline {
            background: linear-gradient(
                to bottom,
                rgba(0, 229, 255, 0) 0%,
                rgba(0, 229, 255, 0.03) 50%,
                rgba(0, 229, 255, 0) 100%
            );
            background-size: 100% 4px;
            pointer-events: none;
        }
        .vignette {
            background: radial-gradient(circle, transparent 40%, rgba(10, 14, 25, 0.9) 100%);
        }
        .glitch-filter {
            filter: contrast(120%) saturate(80%) brightness(1.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface-container-lowest font-body text-on-surface overflow-hidden h-screen w-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- Subtle Cyan Scanline Overlay -->
<div class="fixed inset-0 z-50 scanline opacity-40"></div>
<!-- Vignette Depth Layer -->
<div class="fixed inset-0 z-40 vignette pointer-events-none"></div>
<main class="relative h-full w-full flex flex-col items-center justify-center p-6">
<!-- Background: Dark Deep Space Depth -->
<div class="absolute inset-0 z-0 bg-[#0B0F1A]">
<div class="absolute inset-0 opacity-20" data-alt="high-contrast deep space void with sparse tiny stars and faint nebulae in cold teal and navy tones"></div>
<!-- Debris Layer 1 -->
<div class="absolute top-[20%] left-[15%] w-12 h-12 opacity-40 blur-[1px]">
<img alt="Satellite" class="w-full h-full grayscale brightness-50" data-alt="tiny metallic space debris floating in the dark void with sharp lighting and cold reflections" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEDK67uQVIpA_4WMB1LAVAS8W31SIOsYCdC0C7Ka62MCV_dAnVIPjhdBUvi22Ewns7K1xCRW8OY2qZS9Sr20_w_PspWQc-0R5dzLthlv1gbetSlZnapX5LSeVRFfLND-hTvNSEbvvsOCtvliXLtd6WO3U9tmGfJXnmbpENnyPzff3IhaV0VmSAbV6dDXEcyZYkFqwY3BPaTKcGoDcvBRKYYTbemDQv6GnflKHzTQixAjZYR1Nvastl7ZCmAsijQrsHS3nB3jox-gU"/>
</div>
<!-- Debris Layer 2 -->
<div class="absolute bottom-[30%] right-[20%] w-8 h-8 opacity-30 blur-[2px]">
<img alt="Ice Debris" class="w-full h-full grayscale brightness-75" data-alt="jagged floating space rock or ice shard drifting through the dark vacuum of deep space" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB9N2GkihHBYhj_2T3xNsf_RTmYoJvPn9Tp42Zk3MmIoUof82bdbWE9MO1DgrJc6060Kk-FWd99PXoRKVF2Fy_Pg9Z6dx3TgRTU6KIqWshCgCvf9vAIIAX7KAsmCu254SnLPbNMniwmc2-aI3juLviA0qyiCPIrYxgr731AFe6hOxVbISWW66AgaTTIrLfdDUJrAW-zESwzZikBULoOzK4RM-8rtJcwLfYJBW5wesQMmMLdzOKCT8vyxGIGbxq3Fujsjs2EGEkIvSo"/>
</div>
</div>
<!-- Central Earth Element -->
<div class="relative z-10 w-full max-w-2xl aspect-square flex items-center justify-center">
<!-- Neon Bloom behind Earth -->
<div class="absolute w-[60%] h-[60%] bg-primary-container/10 rounded-full blur-[100px]"></div>
<!-- Glitchy Earth Container -->
<div class="relative w-[70%] h-[70%] rounded-full overflow-hidden glitch-filter border border-primary/5">
<img alt="Glitchy Earth" class="w-full h-full object-cover scale-110 contrast-125 saturate-50 brightness-75" data-alt="low resolution pixelated earth from space with visible scanning lines digital artifacts and heavy teal glitch distortion" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDhp3vIk5F07DrPFYiEvC9fWwYSqE940WmlLcBYMqpLhBpIMbQIRElCxRmvXEFPbcMpKo9cU1qFJOARXXWRRPwGHxPIM103VlThgCvUA7xTHFDIymLb0Nnc3ttadD6rqdP3PeP75Nxt3TFQxckiQ1xwRGNvrQLB518OQX_6Ay-qgDQ3CCRZA8jH7otTqbwYA27Xy4j2H02-crWkWQfr3RDgzDMWNp8sS4ZwtibtbimGjT0FhHAcBQXcDMHeDrYESA269WbGamQLhN8"/>
<!-- Internal Glitch Overlays -->
<div class="absolute inset-0 bg-gradient-to-t from-[#0B0F1A] via-transparent to-transparent opacity-60"></div>
<div class="absolute inset-0 border-[20px] border-surface-container-lowest/20 rounded-full blur-xl"></div>
</div>
<!-- Orbiting Particle (Pseudo-Satellite) -->
<div class="absolute w-[90%] h-[90%] rounded-full border border-primary/5 pointer-events-none">
<div class="absolute -top-1 left-1/2 w-1.5 h-1.5 bg-primary-container rounded-full shadow-[0_0_8px_#00E5FF]"></div>
</div>
</div>
<!-- Branding Section -->
<div class="relative z-20 mt-[-4rem] text-center space-y-4">
<h1 class="font-orbitron text-7xl md:text-9xl font-black tracking-[-0.05em] text-primary drop-shadow-[0_0_15px_rgba(0,229,255,0.6)]">
                NU:TONIC
            </h1>
<div class="flex items-center justify-center space-x-4">
<div class="h-[1px] w-12 bg-gradient-to-r from-transparent to-primary/40"></div>
<p class="font-headline text-sm md:text-base text-on-surface-variant uppercase tracking-[0.4em] font-light">
                    Memory is all that remains
                </p>
<div class="h-[1px] w-12 bg-gradient-to-l from-transparent to-primary/40"></div>
</div>
</div>
<!-- Bottom Action / CTA -->
<div class="absolute bottom-16 z-30 flex flex-col items-center gap-6">
<button class="group relative px-12 py-4 bg-surface-container-high overflow-hidden rounded-lg transition-all duration-300 hover:scale-105 active:scale-95 border border-primary/20">
<!-- Button Glow Effect -->
<div class="absolute inset-0 bg-primary-container/0 group-hover:bg-primary-container/5 transition-colors"></div>
<div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity blur-xl bg-primary-container/20"></div>
<span class="relative font-headline text-primary tracking-[0.2em] font-bold text-xs uppercase">
                    Initialize Protocol
                </span>
</button>
<!-- System Stats Recessed -->
<div class="flex gap-8 text-[10px] font-label text-outline tracking-widest uppercase">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-tertiary shadow-[0_0_4px_#00EE91]"></span>
<span>System Stable</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[12px]">sensors</span>
<span>1,250 XP Active</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[12px]">database</span>
<span>Sector 7-G</span>
</div>
</div>
</div>

<div class="fixed top-8 left-8 z-30 opacity-40">
<div class="w-8 h-8 border-t-2 border-l-2 border-primary/30"></div>
</div>
<div class="fixed top-8 right-8 z-30 opacity-40">

</div>
<div class="fixed bottom-8 left-8 z-30 opacity-40">
<div class="w-8 h-8 border-b-2 border-l-2 border-primary/30"></div>
</div>
<div class="fixed bottom-8 right-8 z-30 opacity-40 text-right">
<div class="w-8 h-8 border-b-2 border-r-2 border-primary/30 ml-auto mb-2"></div>
<span class="font-label text-[8px] text-outline tracking-tighter block uppercase">Build v0.9.4-Beta</span>
</div>
