# Satellite LFM-VL caption worker (Tonic / GPU or ZeroGPU).
#
# GPU / ZeroGPU Spaces must stay under the **Tonic** Hub org; `deploy_space.py` enforces `hf_space_owner_org`.
hf_space_owner_org: Tonic

space_hardware: zero-a10g
space_sdk: gradio
sleep_time_seconds: -1

variables:
  PORT: "7860"
  LFM_SATELLITE_BACKEND: transformers
  LFM_SATELLITE_EAGER_LOAD: "0"

secrets:
  OPENAI_API_KEY: TONIC_LFM_SATELLITE_OPENAI_API_KEY
  OPENAI_BASE_URL: TONIC_LFM_SATELLITE_OPENAI_BASE_URL
