# Thin game server (NuTonic). Prefer Postgres URL in secret for production.

space_hardware: cpu-basic
sleep_time_seconds: null

variables:
  FEATURE_RANKED: "false"
  FEATURE_COMMUNITY_LB_POST: "false"
  FEATURE_PRO_JOBS: "false"
  NUTONIC_EXPOSE_MANIFEST_ROUND_TRUTH: "false"
  NUTONIC_HF_PERSISTENCE_ENABLED: "false"
  NUTONIC_HF_PERSISTENCE_REQUIRED: "false"
  NUTONIC_HF_PERSISTENCE_REPO_ID: ""
  NUTONIC_HF_PERSISTENCE_SUBDIR: "server-persistence"
  NUTONIC_HF_PERSISTENCE_STARTUP_PULL_MODE: "if_missing"

secrets:
  JWT_SECRET: NUTONIC_JWT_SECRET
  NUTONIC_LEADERBOARD_DATABASE_URL: NUTONIC_LEADERBOARD_DATABASE_URL
  NUTONIC_RANKED_DATABASE_URL: NUTONIC_RANKED_DATABASE_URL
  HF_API_WRITE: NUTONIC_HF_PERSISTENCE_TOKEN
