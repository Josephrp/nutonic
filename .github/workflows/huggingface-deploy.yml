# Deploy Python services to Hugging Face Docker Spaces after targeted pytest.
# Hub write token (first non-empty): HF_TOKEN_TONIC|HF_TOKEN|HF_API_WRITE (Tonic jobs),
#   HF_TOKEN_NUTONIC|HF_TOKEN|HF_API_WRITE (NuTonic jobs). See tools/hf_deploy/README.md.
# Optional runtime secrets are forwarded as env vars so deploy_space.py can push them to the Space.
# See tools/hf_deploy/README.md

name: huggingface — deploy Spaces

on:
  push:
    branches:
      - main
    paths:
      - "inference/streetview_pano_service/**"
      - "inference/lfm_vl_hint_service/**"
      - "inference/lfm_vl_satellite_caption_service/**"
      - "inference/terramind_tim_local/**"
      - "inference/pro_gradio_demo/**"
      - "server/**"
      - "inference/pro_materialization_service/**"
      - "tools/hf_deploy/**"
      - "tools/live_inference_smoke.py"
      - "tools/stage_pro_vlm_bundle.py"
      - "tools/requirements.txt"
      - ".github/workflows/huggingface-deploy.yml"
  workflow_dispatch:
    inputs:
      targets:
        description: "Which services to deploy"
        type: choice
        options:
          - all
          - streetview_pano
          - lfm_vl_hint
          - lfm_vl_satellite
          - terramind_tim
          - pro_gradio_demo
          - game_server
          - pro_materialization
        default: all

concurrency:
  group: huggingface-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changes:
    name: Path / dispatch gate
    runs-on: ubuntu-latest
    outputs:
      streetview: ${{ steps.set.outputs.streetview }}
      lfm: ${{ steps.set.outputs.lfm }}
      satellite: ${{ steps.set.outputs.satellite }}
      tim: ${{ steps.set.outputs.tim }}
      pro_demo: ${{ steps.set.outputs.pro_demo }}
      server: ${{ steps.set.outputs.server }}
      pro: ${{ steps.set.outputs.pro }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            streetview:
              - 'inference/streetview_pano_service/**'
            lfm:
              - 'inference/lfm_vl_hint_service/**'
            satellite:
              - 'inference/lfm_vl_satellite_caption_service/**'
            tim:
              - 'inference/terramind_tim_local/**'
            pro_demo:
              - 'inference/pro_gradio_demo/**'
            server:
              - 'server/**'
            pro:
              - 'inference/pro_materialization_service/**'
            tools:
              - 'tools/hf_deploy/**'
              - 'tools/live_inference_smoke.py'
              - 'tools/stage_pro_vlm_bundle.py'
              - 'tools/requirements.txt'
              - '.github/workflows/huggingface-deploy.yml'

      - id: set
        shell: bash
        run: |
          set_deploy_flags() {
            echo "streetview=$1" >> "$GITHUB_OUTPUT"
            echo "lfm=$2" >> "$GITHUB_OUTPUT"
            echo "satellite=$3" >> "$GITHUB_OUTPUT"
            echo "tim=$4" >> "$GITHUB_OUTPUT"
            echo "pro_demo=$5" >> "$GITHUB_OUTPUT"
            echo "server=$6" >> "$GITHUB_OUTPUT"
            echo "pro=$7" >> "$GITHUB_OUTPUT"
          }
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            T="${{ github.event.inputs.targets }}"
            case "$T" in
              all)
                set_deploy_flags true true true true true true true ;;
              streetview_pano)
                set_deploy_flags true false false false false false false ;;
              lfm_vl_hint)
                set_deploy_flags false true false false false false false ;;
              lfm_vl_satellite)
                set_deploy_flags false false true false false false false ;;
              terramind_tim)
                set_deploy_flags false false false true false false false ;;
              pro_gradio_demo)
                set_deploy_flags false false false false true false false ;;
              game_server)
                set_deploy_flags false false false false false true false ;;
              pro_materialization)
                set_deploy_flags false false false false false false true ;;
              *)
                set_deploy_flags true true true true true true true ;;
            esac
          else
            STREETVIEW='${{ steps.filter.outputs.streetview }}'
            LFM='${{ steps.filter.outputs.lfm }}'
            SAT='${{ steps.filter.outputs.satellite }}'
            TIM='${{ steps.filter.outputs.tim }}'
            DEMO='${{ steps.filter.outputs.pro_demo }}'
            SRV='${{ steps.filter.outputs.server }}'
            PRO='${{ steps.filter.outputs.pro }}'
            TOOLS='${{ steps.filter.outputs.tools }}'
            if [ "$TOOLS" = "true" ]; then
              set_deploy_flags true true true true true true true
            else
              set_deploy_flags "${STREETVIEW:-false}" "${LFM:-false}" "${SAT:-false}" "${TIM:-false}" "${DEMO:-false}" "${SRV:-false}" "${PRO:-false}"
            fi
          fi

  pytest-streetview-pano:
    name: Pytest — streetview_pano_service
    needs: changes
    if: needs.changes.outputs.streetview == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + test
        run: |
          pip install -U pip
          pip install pytest
          pip install -e "./inference/streetview_pano_service[dev]"
          python -m pytest inference/streetview_pano_service/tests -q

  pytest-lfm-vl-hint:
    name: Pytest — lfm_vl_hint_service
    needs: changes
    if: needs.changes.outputs.lfm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + test
        run: |
          pip install -U pip
          pip install pytest
          pip install -e "./inference/lfm_vl_hint_service[dev]"
          python -m pytest inference/lfm_vl_hint_service/tests -q

  pytest-lfm-vl-satellite:
    name: Pytest — lfm_vl_satellite_caption_service
    needs: changes
    if: needs.changes.outputs.satellite == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + test
        run: |
          pip install -U pip
          pip install pytest
          pip install -e "./inference/lfm_vl_satellite_caption_service[dev]"
          python -m pytest inference/lfm_vl_satellite_caption_service/tests -q

  pytest-terramind-tim:
    name: Pytest — terramind_tim_local
    needs: changes
    if: needs.changes.outputs.tim == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + test
        run: |
          pip install -U pip setuptools wheel
          pip install pytest
          pip install -e "./inference/terramind_tim_local[dev,space]"
          python -m pytest inference/terramind_tim_local/tests -q

  pytest-game-server:
    name: Pytest — server
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + test
        run: |
          pip install -U pip
          pip install -e "./server[dev]"
          pytest server/tests -q

  pytest-pro-materialization:
    name: Pytest — pro_materialization_service
    needs: changes
    if: needs.changes.outputs.pro == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + test
        run: |
          pip install -U pip
          pip install pytest
          pip install -e "./inference/pro_materialization_service"
          python -m pytest inference/pro_materialization_service/tests -q

  pytest-pro-gradio-demo:
    name: Pytest — pro_gradio_demo
    needs: changes
    if: needs.changes.outputs.pro_demo == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + import check
        run: |
          pip install -U pip
          pip install pytest
          # The demo Space imports Gradio; install the `serve` extra in CI.
          pip install -e "./inference/pro_gradio_demo[serve]"
          python -m pytest inference/pro_gradio_demo/tests -q

  deploy-streetview-pano:
    name: HF deploy — Street View pano (Tonic)
    needs: [changes, pytest-streetview-pano]
    if: needs.changes.outputs.streetview == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install huggingface_hub (hf CLI)
        run: |
          pip install -U pip
          pip install -r tools/hf_deploy/requirements.txt
          hf --version
      - name: Deploy Space (hf upload + runtime sync)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_TONIC || secrets.HF_TOKEN || secrets.HF_API_WRITE }}
          TONIC_GOOGLE_MAPS_API_KEY: ${{ secrets.TONIC_GOOGLE_MAPS_API_KEY || secrets.GOOGLE_MAPS_API_KEY }}
          NUTONIC_INFERENCE_HMAC_SECRET: ${{ secrets.NUTONIC_INFERENCE_HMAC_SECRET || secrets.INFERENCE_HMAC_SECRET }}
        run: >
          python tools/hf_deploy/deploy_space.py
          --service streetview_pano
          --repo-id Tonic/nutonic-streetview-pano
          --token-env HF_TOKEN
      - name: Smoke test deployed Street View Space
        env:
          NUTONIC_INFERENCE_HMAC_SECRET: ${{ secrets.NUTONIC_INFERENCE_HMAC_SECRET || secrets.INFERENCE_HMAC_SECRET }}
        run: |
          pip install -r tools/requirements.txt
          python tools/live_inference_smoke.py --preset streetview-deploy --timeout 30 --strict --json-report-path artifacts/hf-smoke-streetview.json
      - name: Upload Street View smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hf-smoke-streetview
          path: artifacts/hf-smoke-streetview.json
          if-no-files-found: warn

  deploy-lfm-vl-hint:
    name: HF deploy — LFM-VL Street View (Tonic)
    needs: [changes, pytest-lfm-vl-hint]
    if: needs.changes.outputs.lfm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install huggingface_hub (hf CLI)
        run: |
          pip install -U pip
          pip install -r tools/hf_deploy/requirements.txt
          hf --version
      - name: Deploy Space (hf upload + runtime sync)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_TONIC || secrets.HF_TOKEN || secrets.HF_API_WRITE }}
          TONIC_LFM_OPENAI_API_KEY: ${{ secrets.TONIC_LFM_OPENAI_API_KEY }}
          TONIC_LFM_OPENAI_BASE_URL: ${{ secrets.TONIC_LFM_OPENAI_BASE_URL }}
        run: >
          python tools/hf_deploy/deploy_space.py
          --service lfm_vl_hint
          --repo-id Tonic/nutonic-lfm-vl-streetview
          --token-env HF_TOKEN
      - name: Smoke test deployed LFM Space
        run: |
          pip install -r tools/requirements.txt
          python tools/live_inference_smoke.py --preset lfm-deploy --timeout 120 --strict --json-report-path artifacts/hf-smoke-lfm.json
      - name: Upload LFM smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hf-smoke-lfm
          path: artifacts/hf-smoke-lfm.json
          if-no-files-found: warn

  deploy-lfm-vl-satellite:
    name: HF deploy — LFM-VL satellite (Tonic)
    needs: [changes, pytest-lfm-vl-satellite]
    if: needs.changes.outputs.satellite == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install huggingface_hub (hf CLI)
        run: |
          pip install -U pip
          pip install -r tools/hf_deploy/requirements.txt
          hf --version
      - name: Deploy Space (hf upload + runtime sync)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_TONIC || secrets.HF_TOKEN || secrets.HF_API_WRITE }}
          TONIC_LFM_SATELLITE_OPENAI_API_KEY: ${{ secrets.TONIC_LFM_SATELLITE_OPENAI_API_KEY }}
          TONIC_LFM_SATELLITE_OPENAI_BASE_URL: ${{ secrets.TONIC_LFM_SATELLITE_OPENAI_BASE_URL }}
        run: >
          python tools/hf_deploy/deploy_space.py
          --service lfm_vl_satellite
          --repo-id Tonic/nutonic-lfm-vl-satellite
          --token-env HF_TOKEN
      - name: Smoke test deployed satellite Space
        run: |
          pip install -r tools/requirements.txt
          python tools/live_inference_smoke.py --preset satellite-deploy --timeout 120 --strict --json-report-path artifacts/hf-smoke-satellite.json
      - name: Upload satellite smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hf-smoke-satellite
          path: artifacts/hf-smoke-satellite.json
          if-no-files-found: warn

  deploy-terramind-tim:
    name: HF deploy — TerraMind TiM (Tonic)
    needs: [changes, pytest-terramind-tim]
    if: needs.changes.outputs.tim == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install huggingface_hub (hf CLI)
        run: |
          pip install -U pip
          pip install -r tools/hf_deploy/requirements.txt
          hf --version
      - name: Deploy Space (hf upload + runtime sync)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_TONIC || secrets.HF_TOKEN || secrets.HF_API_WRITE }}
          TONIC_TERRAMIND_HF_TOKEN: ${{ secrets.TONIC_TERRAMIND_HF_TOKEN || secrets.HF_API_READ || secrets.HF_TOKEN }}
        run: >
          python tools/hf_deploy/deploy_space.py
          --service terramind_tim
          --repo-id Tonic/nutonic-terramind-tim
          --token-env HF_TOKEN
      - name: Smoke test deployed TerraMind Space
        run: |
          pip install -r tools/requirements.txt
          python tools/live_inference_smoke.py --preset terramind-deploy --timeout 120 --strict --json-report-path artifacts/hf-smoke-terramind.json
      - name: Upload TerraMind smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hf-smoke-terramind
          path: artifacts/hf-smoke-terramind.json
          if-no-files-found: warn

  deploy-pro-gradio-demo:
    name: HF deploy — PRO ZeroGPU demo (Tonic)
    needs: [changes, pytest-pro-gradio-demo]
    if: needs.changes.outputs.pro_demo == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install huggingface_hub (hf CLI)
        run: |
          pip install -U pip
          pip install -r tools/hf_deploy/requirements.txt
          hf --version
      - name: Deploy Space (hf upload + runtime sync)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_TONIC || secrets.HF_TOKEN || secrets.HF_API_WRITE }}
          # Forward the shared HMAC secret so the demo can sign outbound calls when the
          # upstream game server / workers enable inbound HMAC verification. Matches the
          # streetview_pano / pro_materialization deploy steps above.
          NUTONIC_INFERENCE_HMAC_SECRET: ${{ secrets.NUTONIC_INFERENCE_HMAC_SECRET || secrets.INFERENCE_HMAC_SECRET }}
          # Optional: if set, the demo will skip calling `/api/v1/auth/token` (avoids 429s).
          NUTONIC_SERVER_BEARER_TOKEN: ${{ secrets.NUTONIC_SERVER_BEARER_TOKEN }}
          # Optional: Space-side override for the local Transformers VLM bundle.
          NUTONIC_VLM_OVERRIDE_BUNDLE_ID: ${{ secrets.NUTONIC_VLM_OVERRIDE_BUNDLE_ID }}
          NUTONIC_VLM_OVERRIDE_REVISION: ${{ secrets.NUTONIC_VLM_OVERRIDE_REVISION }}
          NUTONIC_VLM_OVERRIDE_DOWNLOAD_URL: ${{ secrets.NUTONIC_VLM_OVERRIDE_DOWNLOAD_URL }}
          NUTONIC_VLM_OVERRIDE_SHA256: ${{ secrets.NUTONIC_VLM_OVERRIDE_SHA256 }}
          NUTONIC_VLM_OVERRIDE_SIZE_BYTES: ${{ secrets.NUTONIC_VLM_OVERRIDE_SIZE_BYTES }}
        run: >
          python tools/hf_deploy/deploy_space.py
          --service pro_gradio_demo
          --repo-id Tonic/nutonic-pro-demo
          --token-env HF_TOKEN

  deploy-game-server:
    name: HF deploy — game server (NuTonic)
    needs: [changes, pytest-game-server]
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install huggingface_hub (hf CLI)
        run: |
          pip install -U pip
          pip install -r tools/hf_deploy/requirements.txt
          hf --version
      - name: Stage PRO VLM model bundle
        if: vars.NUTONIC_PRO_VLM_EMBED_IN_SPACE == 'true'
        env:
          # Empty uses tools/stage_pro_vlm_bundle.py default:
          # Default staging URL: tools/stage_pro_vlm_bundle.py → NuTonic/lspace (tools/hf_deploy/profiles/game_server.yaml).
          NUTONIC_PRO_VLM_MODEL_SOURCE_URL: ${{ vars.NUTONIC_PRO_VLM_MODEL_SOURCE_URL }}
          NUTONIC_PRO_VLM_MODEL_EXPECTED_SHA256: ${{ vars.NUTONIC_PRO_VLM_MODEL_EXPECTED_SHA256 }}
        run: |
          python tools/stage_pro_vlm_bundle.py --required
      - name: Deploy Space (hf upload + runtime sync)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_NUTONIC || secrets.HF_TOKEN || secrets.HF_API_WRITE }}
          NUTONIC_JWT_SECRET: ${{ secrets.NUTONIC_JWT_SECRET }}
          NUTONIC_LEADERBOARD_DATABASE_URL: ${{ secrets.NUTONIC_LEADERBOARD_DATABASE_URL }}
          NUTONIC_RANKED_DATABASE_URL: ${{ secrets.NUTONIC_RANKED_DATABASE_URL }}
          NUTONIC_HF_PERSISTENCE_ENABLED: ${{ vars.NUTONIC_HF_PERSISTENCE_ENABLED }}
          NUTONIC_HF_PERSISTENCE_REQUIRED: ${{ vars.NUTONIC_HF_PERSISTENCE_REQUIRED }}
          NUTONIC_HF_PERSISTENCE_REPO_ID: ${{ vars.NUTONIC_HF_PERSISTENCE_REPO_ID }}
          NUTONIC_HF_PERSISTENCE_SUBDIR: ${{ vars.NUTONIC_HF_PERSISTENCE_SUBDIR }}
          NUTONIC_HF_PERSISTENCE_STARTUP_PULL_MODE: ${{ vars.NUTONIC_HF_PERSISTENCE_STARTUP_PULL_MODE }}
          NUTONIC_HF_PERSISTENCE_TOKEN: ${{ secrets.NUTONIC_HF_PERSISTENCE_TOKEN || secrets.HF_API_WRITE || secrets.HF_TOKEN }}
        run: >
          python tools/hf_deploy/deploy_space.py
          --service game_server
          --repo-id NuTonic/nutonic-game-server
          --token-env HF_TOKEN
      - name: Smoke test deployed game server Space
        run: |
          pip install -r tools/requirements.txt
          python tools/live_inference_smoke.py --preset game-deploy --timeout 30 --strict --json-report-path artifacts/hf-smoke-game.json
      - name: Upload game server smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hf-smoke-game
          path: artifacts/hf-smoke-game.json
          if-no-files-found: warn

  deploy-pro-materialization:
    name: HF deploy — PRO materialization (NuTonic)
    needs: [changes, pytest-pro-materialization]
    if: needs.changes.outputs.pro == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install huggingface_hub (hf CLI)
        run: |
          pip install -U pip
          pip install -r tools/hf_deploy/requirements.txt
          hf --version
      - name: Deploy Space (hf upload + runtime sync)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_NUTONIC || secrets.HF_TOKEN || secrets.HF_API_WRITE }}
          NUTONIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.NUTONIC_MAPBOX_ACCESS_TOKEN || secrets.MAPBOX_ACCESS_TOKEN }}
          NUTONIC_INFERENCE_HMAC_SECRET: ${{ secrets.NUTONIC_INFERENCE_HMAC_SECRET || secrets.INFERENCE_HMAC_SECRET }}
        run: >
          python tools/hf_deploy/deploy_space.py
          --service pro_materialization
          --repo-id NuTonic/nutonic-pro-materialization
          --token-env HF_TOKEN
      - name: Wait for PRO Space Docker build (Hub runtime)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_NUTONIC || secrets.HF_TOKEN || secrets.HF_API_WRITE }}
        run: python tools/hf_deploy/wait_for_space_runtime.py --repo-id NuTonic/nutonic-pro-materialization
      - name: Smoke test deployed PRO materialization Space
        env:
          NUTONIC_INFERENCE_HMAC_SECRET: ${{ secrets.NUTONIC_INFERENCE_HMAC_SECRET || secrets.INFERENCE_HMAC_SECRET }}
        run: |
          pip install -r tools/requirements.txt
          python tools/live_inference_smoke.py --preset pro-deploy --timeout 45 --strict --json-report-path artifacts/hf-smoke-pro.json --pro-materialize-max-attempts 4 --pro-materialize-wait-interval 5
      - name: Upload PRO smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hf-smoke-pro
          path: artifacts/hf-smoke-pro.json
          if-no-files-found: warn
