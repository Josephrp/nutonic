# CodeQL static analysis (Java/Kotlin via Gradle) and Gitleaks secret scanning.
# Pre-commit: install with `pip install pre-commit` then `pre-commit install` (see .pre-commit-config.yaml).

name: Security — CodeQL and secrets

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Weekly: catches drift on default branch when there are no pushes.
    - cron: "12 6 * * 1"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql-java:
    name: CodeQL (Java / Kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      security-events: write
      actions: read
    defaults:
      run:
        working-directory: nutonic
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - uses: android-actions/setup-android@v3

      - name: local.properties (Android SDK + maps stub)
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" >> local.properties
          echo "MAPS_API_KEY=CI_STUB" >> local.properties

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          build-mode: manual

      - name: Build (Gradle compile for extractors)
        run: |
          ./gradlew --no-configuration-cache --continue \
            :shared:compileKotlinDesktop \
            :androidApp:compileDebugKotlinAndroid \
            :desktopApp:compileKotlinJvm

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    # gitleaks-action calls the Pulls API (e.g. list commits on a PR); `contents: read` alone is not enough.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
