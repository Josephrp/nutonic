name: iOS — KMP framework + simulator build

on:
  pull_request:
    paths:
      - "nutonic/shared/**"
      - "nutonic/iosApp/**"
      - ".github/workflows/ios-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "nutonic/shared/**"
      - "nutonic/iosApp/**"
      - ".github/workflows/ios-ci.yml"

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: nutonic

jobs:
  build-ios-sim:
    name: Build shared.framework + iosApp (simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # KMP project includes Android targets; keep Gradle parity with other workflows.
      - uses: android-actions/setup-android@v3

      - name: local.properties for Gradle (KMP embed script)
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" >> local.properties
          echo "MAPS_API_KEY=CI_STUB" >> local.properties

      - name: Build Kotlin/Native shared.framework (iOS simulator)
        run: |
          ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Xcode build (simulator, unsigned)
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}/nutonic/iosApp"
          # Use generic simulator destination so CI does not depend on a specific device
          # (e.g. "iPhone 15") that newer Xcode images may omit from preinstalled simulators.
          xcodebuild -project iosApp.xcodeproj -scheme iosApp -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            build \
            CODE_SIGNING_ALLOWED=NO

