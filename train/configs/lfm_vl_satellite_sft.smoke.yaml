project_name: "nutonic_sat_vl_sft"
model_name: "LFM2.5-VL-450M"
training_type: "vlm_sft"
dataset:
  path: "NuTonic/sat-vl-sft-training-ready-v1"
  type: "vlm_sft"
  limit: 32
  test_size: 0.02
  split: "train"
  image_root: null
  cache_dataset: false
training_config:
  extends: "DEFAULT_VLM_SFT"
  num_train_epochs: 1.0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1e-05
  warmup_ratio: 0.05
  weight_decay: 0.0
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_strategy: "epoch"
  eval_strategy: "epoch"
  eval_on_start: true
  gradient_checkpointing: true
  dataloader_drop_last: true
  max_image_tokens: null
  do_image_splitting: true
  vision_encoder_lr_multiplier: 0.05
  tracker: "none"
peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
