# Local dev stack: guess telemetry ON + public manifest includes round fixtures (still_bundle_id path).
# Usage (repo root):  docker compose -f server/docker-compose.dev.yml up --build
services:
  nutonic-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    environment:
      FEATURE_GUESSES_RECORD: "true"
      FEATURE_RANKED: "true"
      NUTONIC_EXPOSE_MANIFEST_ROUND_TRUTH: "true"
      # Web / Vite dev servers — adjust to your client origin.
      CORS_ORIGINS: "http://localhost:8080,http://localhost:5173,http://127.0.0.1:5173"
    volumes:
      - nutonic_server_data:/app/data

volumes:
  nutonic_server_data:
